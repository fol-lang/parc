name: code

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CC: gcc

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.89.0"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${{ matrix.toolchain }}" --profile minimal --component clippy --component rustfmt
          rustup default "${{ matrix.toolchain }}"

      - name: Install native prerequisites
        run: sudo apt-get update && sudo apt-get install --yes build-essential clang libcurl4-openssl-dev libssl-dev

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@948b432f0fddb61de0806565a7222b36e12e2ee3 # v2.0.0
        with:
          mdbook-version: "0.5.3"

      - name: Verify
        run: make verify
